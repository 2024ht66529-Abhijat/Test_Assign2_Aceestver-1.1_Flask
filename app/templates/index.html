<!doctype html>
<html>
<head>
    <title>ACEest Fitness</title>
</head>
<body style="background:#1a1a1a;color:white;font-family:sans-serif;">
    <h1>ACEest Functional Fitness System</h1>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

    {% for name, details in programs.items() %}
        <div style="background:{{ details.color }};padding:10px;margin:10px;">
            <b>{{ name }}</b>
            <p>Workout: {{ details.workout|safe }}</p>
            <p>Diet: {{ details.diet|safe }}</p>
        </div>
    {% endfor %}
</body>
</html>
