sonar.projectKey=aceestver
sonar.projectName=Aceestver Flask Application

# Source and test directories
sonar.sources=app,tests
sonar.tests=tests

# Exclusions to prevent duplicate indexing
sonar.exclusions=tests/conftest.py,**/__pycache__/**,**/*.pyc
sonar.test.exclusions=**/__pycache__/**,**/*.pyc

# Coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Wait for Quality Gate result
sonar.qualitygate.wait=true
