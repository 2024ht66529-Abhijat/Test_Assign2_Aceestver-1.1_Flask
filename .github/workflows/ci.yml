name: ACEest CI 1.1

on:
  push:
    branches: ["main"]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run-tests:
        description: 'Run tests before deployment?'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # ensures full git history

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build Docker image
        run: docker build -t aceest-fitness .

  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # avoids shallow clone warning

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.version=3.10
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trigger-jenkins:
    runs-on: self-hosted
    needs: sonarcloud-analysis
    steps: 
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Trigger Jenkins Job
        uses: appleboy/jenkins-action@v1
        with:
          url: ${{ secrets.JENKINS_URL_L }}
          user: "Abhijat_2024ht66529"
          token: ${{ secrets.JENKINS_TOKEN_L }}
          job: "Test-Assignment2"

  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aceestver:${{ github.ref_name }} .

      - name: Run Tests Inside Container
        run: docker run ${{ secrets.DOCKER_USERNAME }}/aceestver:${{ github.ref_name }} pytest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aceestver:${{ github.ref_name }}
