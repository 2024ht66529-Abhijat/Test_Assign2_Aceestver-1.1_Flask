name: CI

on:
  push:
    branches: ["main"]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run-tests:
        description: 'Run tests before deployment?'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=. -m pytest
          coverage xml -i --rcfile=.coveragerc

      - name: Normalize coverage.xml with Python
        run: |
          python -c "import re; f='coverage.xml'; d=open(f).read(); d=re.sub(r'<source>.*</source>', '<source>.</source>', d); open(f,'w').write(d)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -X
            -Dsonar.verbose=true
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.version=3.10
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Fetch SonarCloud Issues
        run: |
          curl -s -u ${{ secrets.SONAR_TOKEN }}: \
            "https://sonarcloud.io/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&resolved=false" \
            -o sonar_issues.json

      - name: Fetch SonarCloud Quality Gate
        run: |
          curl -s -u ${{ secrets.SONAR_TOKEN }}: \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${{ secrets.SONAR_PROJECT_KEY }}" \
            -o sonar_quality_gate.json

      - name: Generate SonarCloud Summary (Markdown)
        run: |
          python3 <<'EOF'
          import json, pathlib

          issues = json.load(open("sonar_issues.json"))
          qg     = json.load(open("sonar_quality_gate.json"))

          out = pathlib.Path("sonar_summary.md")
          with out.open("w") as f:
              f.write("# SonarCloud Analysis Summary\n\n")

              status = qg.get("projectStatus", {}).get("status", "UNKNOWN")
              f.write(f"**Quality Gate Status:** {status}\n\n")

              total = issues.get("total", 0)
              f.write(f"**Open Issues:** {total}\n\n")

              f.write("### Top Issues\n")
              for i, issue in enumerate(issues.get("issues", [])[:10], 1):
                  sev = issue.get("severity")
                  msg = issue.get("message")
                  rule = issue.get("rule")
                  comp = issue.get("component")
                  f.write(f"{i}. [{sev}] {msg} (rule: {rule}, file: {comp})\n")
          EOF

      - name: Upload SonarCloud Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: |
            sonar_issues.json
            sonar_quality_gate.json
            sonar_summary.md

  trigger-jenkins:
    runs-on: self-hosted
    needs: sonarcloud-analysis
    steps: 
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Trigger Jenkins Job
        uses: appleboy/jenkins-action@v1
        with:
          url: ${{ secrets.JENKINS_URL_L }}
          user: "Abhijat_2024ht66529"
          token: ${{ secrets.JENKINS_TOKEN_L }}
          job: "Test-Assignment2"
          wait: true
