name: CI

on:
  push:
    branches: ["main"]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run-tests:
        description: 'Run tests before deployment?'
        required: false
        default: 'true'
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          coverage run --source=. -m pytest
          coverage xml -i --rcfile=.coveragerc

      - name: Normalize coverage.xml with Python
        run: |
          python -c "import re; f='coverage.xml'; d=open(f).read(); d=re.sub(r'<source>.*</source>', '<source>.</source>', d); open(f,'w').write(d)"

      - name: Debug coverage.xml before upload
        run: |
          grep "<source>" coverage.xml
          cat coverage.xml | head -n 20   # show first 20 lines

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonarcloud-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   

      - name: Show sonar-project.properties
        run: cat sonar-project.properties     

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Debug coverage.xml after download
        run: |
          grep "<source>" coverage.xml
          cat coverage.xml | head -n 20   # show first 20 lines

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -X
            -Dsonar.verbose=true
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.python.version=3.10
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
