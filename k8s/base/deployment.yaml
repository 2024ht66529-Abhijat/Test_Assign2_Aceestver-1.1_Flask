apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceestver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceestver
  template:
    metadata:
      labels:
        app: aceestver
    spec:
      containers:
      - name: aceestver
        image: 2024ht66529/aceestver:stable
        ports:
        - containerPort: 5000
