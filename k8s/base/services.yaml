apiVersion: v1
kind: Service
metadata:
  name: aceestver-service
spec:
  selector:
    app: aceestver   # must match the label in your Deployment's pod template
  ports:
    - protocol: TCP
      port: 5000       # service port (matches containerPort)
      targetPort: 5000 # container port inside the pod
      nodePort: 30080  # optional fixed NodePort (range: 30000–32767)
  type: NodePort
